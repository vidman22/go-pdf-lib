name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, 'norelease') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      run: go test -v ./...

    - name: Build
      run: go build -v ./...

    - name: Create tag
      uses: mathieudutour/github-tag-action@v6.1
      id: create_tag
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        fetch_all_tags: true
